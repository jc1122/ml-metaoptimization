# Catalog metadata for OpenAI/Codex-style runtimes.
# This file is not consumed by the GitHub Copilot orchestration runtime described in SKILL.md.
interface:
  display_name: "ML Metaoptimization"
  short_description: "State-machine ML metaoptimization via Copilot subagents and a queue-backend contract"
  categories:
    - ml
    - research
    - distributed
  default_prompt: >
    Run the continuous ML metaoptimization state machine for the configured campaign.
    Read `ml_metaopt_campaign.yaml`, hydrate or create `.ml-metaopt/state.json`,
    maintain the background slot pool, package validated experiment batches, and
    drive the remote Ray queue runner through the declared queue commands.
